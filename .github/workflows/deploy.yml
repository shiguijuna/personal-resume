name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build and deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            APP_DIR=/opt/personal-resume
            SRC_DIR="$APP_DIR/source"
            REPO_URL=https://github.com/shiguijuna/personal-resume.git
            COMMIT=${{ github.sha }}

            mkdir -p "$APP_DIR"
            if [ -d "$SRC_DIR/.git" ]; then
              cd "$SRC_DIR"
              git fetch --depth 1 origin "$COMMIT"
              git checkout --force "$COMMIT"
            else
              rm -rf "$SRC_DIR"
              git clone --no-checkout "$REPO_URL" "$SRC_DIR"
              cd "$SRC_DIR"
              git fetch --depth 1 origin "$COMMIT"
              git checkout --force "$COMMIT"
            fi

            cd "$SRC_DIR"
            docker build -t personal-resume:latest -t "personal-resume:$COMMIT" .

            cat > "$APP_DIR/docker-compose.yml" <<'COMPOSE'
            services:
              personal-resume:
                image: personal-resume:latest
                container_name: personal-resume
                restart: unless-stopped
                ports:
                  - "127.0.0.1:3001:80"
            COMPOSE

            docker compose -f "$APP_DIR/docker-compose.yml" up -d --remove-orphans
            docker image prune -f
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3001/ >/dev/null; then
                exit 0
              fi
              sleep 2
            done
            docker logs --tail 80 personal-resume
            exit 1
